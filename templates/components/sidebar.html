<aside :class="sidebarOpen ? 'w-64' : 'w-20'"
    class="glass m-4 mr-0 rounded-3xl hidden lg:flex flex-col transition-all duration-300 ease-in-out">
    <div class="p-6 flex items-center justify-between border-b border-slate-800">
        <h2 x-show="sidebarOpen"
            class="text-xs uppercase tracking-widest font-bold text-slate-500 transition-opacity duration-300">Menú
            Admin</h2>
        <button @click="sidebarOpen = !sidebarOpen" class="text-slate-400 hover:text-white transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </div>
    <div class="p-6 flex-1">
        <nav class="space-y-2">
            <a href="{% url 'dashboard' %}"
                class="sidebar-link {% if request.resolver_match.url_name == 'dashboard' %}active text-blue-400 bg-white/5{% endif %} flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-white/5 transition group"
                :class="!sidebarOpen ? 'justify-center px-0' : ''">
                <svg class="w-5 h-5 text-slate-400 group-hover:text-blue-400 shrink-0" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
                <span x-show="sidebarOpen" class="transition-opacity duration-300 whitespace-nowrap">Analytics</span>
            </a>
            <a href="{% url 'admin_clientes' %}"
                class="sidebar-link {% if request.resolver_match.url_name == 'admin_clientes' %}active text-blue-400 bg-white/5{% endif %} flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-white/5 transition group"
                :class="!sidebarOpen ? 'justify-center px-0' : ''">
                <svg class="w-5 h-5 text-slate-400 group-hover:text-blue-400 shrink-0" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <span x-show="sidebarOpen" class="transition-opacity duration-300 whitespace-nowrap">Clientes</span>
            </a>
            <a href="{% url 'admin_rutinas' %}"
                class="sidebar-link {% if request.resolver_match.url_name == 'admin_rutinas' %}active text-blue-400 bg-white/5{% endif %} flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-white/5 transition group"
                :class="!sidebarOpen ? 'justify-center px-0' : ''">
                <svg class="w-5 h-5 text-slate-400 group-hover:text-blue-400 shrink-0" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                <span x-show="sidebarOpen" class="transition-opacity duration-300 whitespace-nowrap">Rutinas</span>
            </a>
        </nav>
    </div>

    <div class="mt-auto p-6 border-t border-slate-800 space-y-4">
        <div class="flex items-center space-x-3" :class="!sidebarOpen ? 'justify-center' : ''">
            <div
                class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white shrink-0">
                {{ user.nombre|slice:":1" }}
            </div>
            <div x-show="sidebarOpen" class="transition-opacity duration-300 whitespace-nowrap">
                <p class="text-sm font-bold text-white">{{ user.nombre_completo }}</p>
                <p class="text-xs text-slate-500">Coach Admin</p>
            </div>
        </div>
        <a href="{% url 'logout' %}" title="Cerrar sesión"
            class="flex items-center space-x-3 px-4 py-2 text-sm text-red-400 hover:bg-red-500/10 rounded-xl transition group"
            :class="!sidebarOpen ? 'justify-center px-0' : ''">
            <svg class="w-4 h-4 shrink-0 transition-transform group-hover:scale-110" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span x-show="sidebarOpen" class="transition-opacity duration-300 whitespace-nowrap">Cerrar sesión</span>
        </a>
    </div>
</aside>
