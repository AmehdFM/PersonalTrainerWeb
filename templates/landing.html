{% extends 'base.html' %}

{% block content %}
<!-- Hero Section -->
<section class="relative min-h-[90vh] flex items-center justify-center pt-24 overflow-hidden">
    <!-- Background Decor -->
    <div class="absolute inset-0 z-0">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600/20 rounded-full blur-[120px]"></div>
    </div>

    <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <h1 class="text-5xl md:text-7xl font-bold tracking-tight mb-6">
            Lleva tu <span class="text-gradient leading-tight">entrenamiento</span><br>al siguiente nivel
        </h1>
        <p class="text-xl text-slate-400 max-w-2xl mx-auto mb-10 leading-relaxed">
            Gestiona tus rutinas, monitorea tu progreso en lbs y maximiza tus resultados con nuestra plataforma diseñada
            para atletas.
        </p>
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="/clientes/"
                class="w-full sm:w-auto bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-10 rounded-2xl shadow-xl shadow-blue-900/50 transition-all active:scale-95 text-lg flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                Soy Cliente
            </a>
            <a href="/dashboard/"
                class="w-full sm:w-auto bg-slate-800 hover:bg-slate-700 border border-slate-600 hover:border-slate-500 text-white font-bold py-4 px-10 rounded-2xl shadow-xl transition-all active:scale-95 text-lg flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2" />
                </svg>
                Panel Admin
            </a>
        </div>
    </div>
</section>
<!-- Extra sections removed per user request -->
{% endblock %}
